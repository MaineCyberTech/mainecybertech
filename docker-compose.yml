services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - apps/api/.env.local
    environment:
      - NODE_ENV=development
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - apps/web/.env.local
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file:
      - apps/worker/.env.local
    environment:
      - NODE_ENV=development
      - HEALTH_PORT=3001
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  e2e:
    image: mcr.microsoft.com/playwright:v1.60.0
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules/
      - /app/apps/web/node_modules/
    environment:
      - E2E_BASE_URL=http://web:3000
      - E2E_ADMIN_EMAIL=${E2E_ADMIN_EMAIL:-superadmin.real@mainecybertech.local}
      - E2E_ADMIN_PASSWORD=${E2E_ADMIN_PASSWORD:-1}
      - CI=true
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    command: >
      sh -c "cd apps/web && npx playwright test --reporter=line"
