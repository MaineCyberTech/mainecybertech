name: worker-deploy-ecs-dev

on:
  workflow_dispatch:
  push:
    branches: [develop]
    paths:
      - "apps/worker/**"
      - "packages/**"
      - ".github/workflows/worker-deploy-ecs.dev.yml"

jobs:
  validate:
    uses: ./.github/workflows/validate.yml

  deploy-dev:
    needs: [validate]
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPOSITORY: ${{ vars.WORKER_ECR_REPOSITORY }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER_NAME }}
      ECS_SERVICE: ${{ vars.WORKER_ECS_SERVICE }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push worker image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" -f apps/worker/Dockerfile .
          docker push "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

      - name: Register task definition and deploy
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          # Extract task definition family from current service
          TASK_DEF_FAMILY=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region "$AWS_REGION" \
            | jq -r '.services[0].taskDefinition | split("/")[1] | split(":")[0]')

          # Fetch current task definition
          TASK_DEF_JSON=$(aws ecs describe-task-definition \
            --task-definition "$TASK_DEF_FAMILY" \
            --region "$AWS_REGION")

          # Build container definition with SHA-tagged image
          NEW_CONTAINER_DEF=$(echo "$TASK_DEF_JSON" | \
            jq -c --arg IMAGE "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            '.taskDefinition.containerDefinitions | map(.image = $IMAGE)')

          # Register new task definition revision
          NEW_TASK_DEF=$(aws ecs register-task-definition \
            --family "$TASK_DEF_FAMILY" \
            --container-definitions "$NEW_CONTAINER_DEF" \
            --cpu "$(echo "$TASK_DEF_JSON" | jq -r '.taskDefinition.cpu')" \
            --memory "$(echo "$TASK_DEF_JSON" | jq -r '.taskDefinition.memory')" \
            --execution-role-arn "$(echo "$TASK_DEF_JSON" | jq -r '.taskDefinition.executionRoleArn')" \
            --task-role-arn "$(echo "$TASK_DEF_JSON" | jq -r '.taskDefinition.taskRoleArn')" \
            --network-mode "$(echo "$TASK_DEF_JSON" | jq -r '.taskDefinition.networkMode')" \
            --requires-compatibilities "$(echo "$TASK_DEF_JSON" | jq -r '.taskDefinition.requiresCompatibilities[]')" \
            --region "$AWS_REGION" \
            | jq -r '.taskDefinition.taskDefinitionArn')

          # Update service with new task definition
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "$NEW_TASK_DEF" \
            --force-new-deployment \
            --region "$AWS_REGION"

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region "$AWS_REGION"
        timeout-minutes: 10
