name: terraform-apply-dev

on:
  push:
    branches: [develop]

jobs:
  apply-dev:
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Create tfvars file
        run: echo "$TF_VARS_FILE" > env/dev.tfvars
        env:
          TF_VARS_FILE: ${{ secrets.TF_VARS_FILE_CONTENT }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Clear stale terraform lock
        run: |
          TABLE="terraform-state-lock-dev"
          PREFIX="mainecybertech-terraform-state-dev/"
          LOCKS=$(aws dynamodb scan --table-name "$TABLE" \
            --filter-expression "begins_with(LockID, :p)" \
            --expression-attribute-values "{\":p\":{\"S\":\"$PREFIX\"}}" \
            --query "Items[*].LockID.S" --output text 2>/dev/null || true)
          if [ -n "$LOCKS" ]; then
            echo "Removing stale lock(s): $LOCKS"
            for LOCK in $LOCKS; do
              aws dynamodb delete-item --table-name "$TABLE" \
                --key "{\"LockID\":{\"S\":\"$LOCK\"}}" || true
            done
          else
            echo "No stale locks found"
          fi

      - name: Terraform init
        run: terraform init -backend-config=${{ vars.TF_BACKEND_CONFIG }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_supabase_anon_key: ${{ secrets.TF_VAR_SUPABASE_ANON_KEY }}
          TF_VAR_supabase_service_role_key: ${{ secrets.TF_VAR_SUPABASE_SERVICE_ROLE_KEY }}
          TF_VAR_jwt_secret: ${{ secrets.TF_VAR_JWT_SECRET }}
          VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Terraform validate
        run: terraform validate

      - name: Import existing resources
        run: |
          # IAM OIDC provider
          OIDC_ARN="arn:aws:iam::600696219742:oidc-provider/token.actions.githubusercontent.com"
          terraform state show aws_iam_openid_connect_provider.github > /dev/null 2>&1 || \
            terraform import aws_iam_openid_connect_provider.github "$OIDC_ARN" || true

          # Cloudflare DNS records — auto-discover via API
          ZONE_ID="8818fac5f101d33e556f8d971f1a3381"
          for RECORD in "app:CNAME" "www:CNAME"; do
            NAME="${RECORD%%:*}"
            TYPE="${RECORD##*:}"
            FQDN="${NAME}.mainecybertech.us"
            ADDR="cloudflare_dns_record.test_${NAME}"
            terraform state show "$ADDR" > /dev/null 2>&1 && continue
            RECORD_ID=$(curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?type=$TYPE&name=$FQDN" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result'][0]['id'] if d.get('result') else '')" 2>/dev/null)
            if [ -n "$RECORD_ID" ]; then
              echo "Importing $ADDR (id=$RECORD_ID)"
              terraform import "$ADDR" "${ZONE_ID}/${RECORD_ID}" || true
            else
              echo "No existing record found for $ADDR, will be created by apply"
            fi
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Terraform apply (dev)
        run: terraform apply -auto-approve -lock-timeout=120s -var-file=${{ vars.TF_VAR_FILE }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_supabase_anon_key: ${{ secrets.TF_VAR_SUPABASE_ANON_KEY }}
          TF_VAR_supabase_service_role_key: ${{ secrets.TF_VAR_SUPABASE_SERVICE_ROLE_KEY }}
          TF_VAR_jwt_secret: ${{ secrets.TF_VAR_JWT_SECRET }}
          VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
