name: terraform-apply-dev

on:
  push:
    branches: [develop]

jobs:
  apply-dev:
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Create tfvars file
        run: echo "$TF_VARS_FILE" > env/dev.tfvars
        env:
          TF_VARS_FILE: ${{ secrets.TF_VARS_FILE_CONTENT }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Clear stale terraform lock
        run: |
          TABLE="terraform-state-lock-dev"
          PREFIX="mainecybertech-terraform-state-dev/"
          LOCKS=$(aws dynamodb scan --table-name "$TABLE" \
            --filter-expression "begins_with(LockID, :p)" \
            --expression-attribute-values "{\":p\":{\"S\":\"$PREFIX\"}}" \
            --query "Items[*].LockID.S" --output text 2>/dev/null || true)
          if [ -n "$LOCKS" ]; then
            echo "Removing stale lock(s): $LOCKS"
            for LOCK in $LOCKS; do
              aws dynamodb delete-item --table-name "$TABLE" \
                --key "{\"LockID\":{\"S\":\"$LOCK\"}}" || true
            done
          else
            echo "No stale locks found"
          fi

      - name: Terraform init
        run: terraform init -backend-config=${{ vars.TF_BACKEND_CONFIG }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_supabase_anon_key: ${{ secrets.TF_VAR_SUPABASE_ANON_KEY }}
          TF_VAR_supabase_service_role_key: ${{ secrets.TF_VAR_SUPABASE_SERVICE_ROLE_KEY }}
          TF_VAR_jwt_secret: ${{ secrets.TF_VAR_JWT_SECRET }}
          VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Terraform validate
        run: terraform validate

      - name: Import existing Supabase project
        run: |
          PROJECT_NAME="mainecybertech-${ENVIRONMENT}"
          echo "Looking up Supabase project: $PROJECT_NAME"
          PROJECT_REF=$(curl -s --connect-timeout 10 --max-time 15 \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects" \
            | python3 -c "import sys,json; projs=json.load(sys.stdin); match=[p for p in projs if p['name']=='$PROJECT_NAME']; print(match[0]['id'] if match else '')" 2>/dev/null)
          if [ -n "$PROJECT_REF" ]; then
            echo "Importing supabase_project.main_db (ref=$PROJECT_REF)"
            terraform import -lock=false supabase_project.main_db "$PROJECT_REF" 2>/dev/null || echo "Already in state or import failed"
          else
            echo "Project $PROJECT_NAME not found — will be created by apply"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_supabase_anon_key: ${{ secrets.TF_VAR_SUPABASE_ANON_KEY }}
          TF_VAR_supabase_service_role_key: ${{ secrets.TF_VAR_SUPABASE_SERVICE_ROLE_KEY }}
          TF_VAR_jwt_secret: ${{ secrets.TF_VAR_JWT_SECRET }}
          VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          ENVIRONMENT: dev

      - name: Terraform apply (dev)
        run: terraform apply -auto-approve -lock-timeout=120s -var-file=${{ vars.TF_VAR_FILE }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_supabase_anon_key: ${{ secrets.TF_VAR_SUPABASE_ANON_KEY }}
          TF_VAR_supabase_service_role_key: ${{ secrets.TF_VAR_SUPABASE_SERVICE_ROLE_KEY }}
          TF_VAR_jwt_secret: ${{ secrets.TF_VAR_JWT_SECRET }}
          VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
