name: deploy-do

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Target deployment environment"
        type: choice
        options: [dev, prod]
        default: dev
  push:
    branches: [main, develop]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "apps/worker/**"
      - "packages/**"
      - "infra/digitalocean/**"
      - ".github/workflows/deploy-do.yml"

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    environment:
      name: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "name=prod" >> $GITHUB_OUTPUT
            echo "app_domain=app.mainecybertech.com" >> $GITHUB_OUTPUT
            echo "api_domain=api.mainecybertech.com" >> $GITHUB_OUTPUT
          else
            echo "name=dev" >> $GITHUB_OUTPUT
            echo "app_domain=app.mainecybertech.us" >> $GITHUB_OUTPUT
            echo "api_domain=api.mainecybertech.us" >> $GITHUB_OUTPUT
          fi
          echo "host=DO_DROPLET_HOST" >> $GITHUB_OUTPUT
          echo "ssh_key=DO_SSH_PRIVATE_KEY" >> $GITHUB_OUTPUT
          echo "ssh_passphrase=DO_SSH_PASSPHRASE" >> $GITHUB_OUTPUT
          echo "ghcr_prefix=ghcr.io/$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.env.outputs.ghcr_prefix }}/mct-api:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          tags: ${{ steps.env.outputs.ghcr_prefix }}/mct-worker:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.env.outputs.ghcr_prefix }}/mct-web:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets[steps.env.outputs.ssh_key] }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -p -P "${{ secrets[steps.env.outputs.ssh_passphrase] }}" -N "" -f ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets[steps.env.outputs.host] }}" >> ~/.ssh/known_hosts

      - name: Deploy to DigitalOcean
        shell: bash
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          GHCR_IMAGE_PREFIX: ${{ steps.env.outputs.ghcr_prefix }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOST: ${{ secrets[steps.env.outputs.host] }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JSM_BASE_URL: ${{ secrets.JSM_BASE_URL }}
          JSM_EMAIL: ${{ secrets.JSM_EMAIL }}
          JSM_API_TOKEN: ${{ secrets.JSM_API_TOKEN }}
          M365_TENANT_ID: ${{ secrets.M365_TENANT_ID }}
          M365_CLIENT_ID: ${{ secrets.M365_CLIENT_ID }}
          M365_CLIENT_SECRET: ${{ secrets.M365_CLIENT_SECRET }}
          APP_DOMAIN: ${{ steps.env.outputs.app_domain }}
          API_DOMAIN: ${{ steps.env.outputs.api_domain }}
        run: |
          echo "SSH_TEST_BEGIN"
          # Minimal SSH test — no stdin redirection
          SSH_OUTPUT=$(ssh -o StrictHostKeyChecking=no -o LogLevel=ERROR root@$HOST "echo ALIVE_$(date +%s)" 2>&1)
          echo "SSH_EXIT=$?"
          echo "SSH_OUTPUT=$SSH_OUTPUT"
          echo "SSH_TEST_END"

          echo "--- WRITING .ENV ---"
          cat > /tmp/.env << ENVEOF
          SUPABASE_URL=$SUPABASE_URL
          JWT_SECRET=$JWT_SECRET
          SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
          SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY
          STRIPE_SECRET_KEY=$STRIPE_SECRET_KEY
          STRIPE_WEBHOOK_SECRET=$STRIPE_WEBHOOK_SECRET
          SENTRY_DSN=$SENTRY_DSN
          SMTP_HOST=$SMTP_HOST
          SMTP_PORT=$SMTP_PORT
          SMTP_USER=$SMTP_USER
          SMTP_PASS=$SMTP_PASS
          EMAIL_FROM=$EMAIL_FROM
          JIRA_BASE_URL=$JIRA_BASE_URL
          JIRA_EMAIL=$JIRA_EMAIL
          JIRA_API_TOKEN=$JIRA_API_TOKEN
          JSM_BASE_URL=$JSM_BASE_URL
          JSM_EMAIL=$JSM_EMAIL
          JSM_API_TOKEN=$JSM_API_TOKEN
          M365_TENANT_ID=$M365_TENANT_ID
          M365_CLIENT_ID=$M365_CLIENT_ID
          M365_CLIENT_SECRET=$M365_CLIENT_SECRET
          APP_DOMAIN=$APP_DOMAIN
          API_DOMAIN=$API_DOMAIN
          ENVEOF

          echo "--- WRITING DEPLOY.SH ---"
          cat > /tmp/deploy.sh << 'DEPLOYSCRIPT'
          #!/bin/bash
          set -euo pipefail
          cd /opt/mct-portal
          cp /tmp/.env /opt/mct-portal/.env
          chmod 600 .env
          IMAGE_TAG="$1" GHCR_IMAGE_PREFIX="$2" docker compose pull api worker web
          IMAGE_TAG="$1" GHCR_IMAGE_PREFIX="$2" docker compose up -d --no-deps api worker web caddy
          docker image prune -f
          sleep 15
          docker compose ps --format "table {{.Name}}\t{{.Status}}"
          DEPLOYSCRIPT
          chmod +x /tmp/deploy.sh

          echo "--- TRANSFERRING .ENV ---"
          base64 -w0 /tmp/.env | ssh -o StrictHostKeyChecking=no -o LogLevel=ERROR root@$HOST "base64 -d > /tmp/.env" 2>&1
          echo "TRANSFER_ENV_EXIT=$?"

          echo "--- TRANSFERRING DEPLOY.SH ---"
          base64 -w0 /tmp/deploy.sh | ssh -o StrictHostKeyChecking=no -o LogLevel=ERROR root@$HOST "base64 -d > /tmp/deploy.sh && chmod +x /tmp/deploy.sh" 2>&1
          echo "TRANSFER_DEPLOY_EXIT=$?"

          echo "--- TRANSFERRING COMPOSE FILE ---"
          base64 -w0 infra/digitalocean/docker-compose.yml | ssh -o StrictHostKeyChecking=no -o LogLevel=ERROR root@$HOST "base64 -d > /opt/mct-portal/docker-compose.yml" 2>&1
          echo "TRANSFER_COMPOSE_EXIT=$?"

          echo "--- TRANSFERRING CADDYFILE ---"
          base64 -w0 infra/digitalocean/Caddyfile | ssh -o StrictHostKeyChecking=no -o LogLevel=ERROR root@$HOST "base64 -d > /opt/mct-portal/Caddyfile" 2>&1
          echo "TRANSFER_CADDY_EXIT=$?"

          echo "--- LOGGING INTO GHCR ---"
          echo "$GHCR_TOKEN" | ssh -o StrictHostKeyChecking=no -o LogLevel=ERROR root@$HOST "docker login ghcr.io -u $GHCR_USERNAME --password-stdin" 2>&1
          echo "LOGIN_EXIT=$?"

          echo "--- EXECUTING DEPLOY ---"
          ssh -o StrictHostKeyChecking=no -o LogLevel=ERROR root@$HOST "bash /tmp/deploy.sh $IMAGE_TAG $GHCR_IMAGE_PREFIX" 2>&1
          echo "DEPLOY_EXIT=$?"
