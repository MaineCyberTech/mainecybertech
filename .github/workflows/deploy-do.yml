name: deploy-do

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Target deployment environment"
        type: choice
        options: [dev, prod]
        default: dev
      rollback_sha:
        description: "SHA to rollback to (leave empty for normal deploy)"
        required: false
        type: string
  push:
    branches: [main, develop]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "apps/worker/**"
      - "packages/**"
      - "infra/digitalocean/**"
      - ".github/workflows/deploy-do.yml"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      name: ${{ steps.env.outputs.name }}
      app_domain: ${{ steps.env.outputs.app_domain }}
      api_domain: ${{ steps.env.outputs.api_domain }}
      www_domain: ${{ steps.env.outputs.www_domain }}
      deploy_host: ${{ steps.env.outputs.deploy_host }}
      cors_origin: ${{ steps.env.outputs.cors_origin }}
      ghcr_prefix: ${{ steps.env.outputs.ghcr_prefix }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            ENV_NAME=prod
            APP_DOMAIN=app.mainecybertech.com
            API_DOMAIN=api.mainecybertech.com
            WWW_DOMAIN=www.mainecybertech.com
            DEPLOY_HOST=app.mainecybertech.com
          else
            ENV_NAME=dev
            APP_DOMAIN=app.mainecybertech.us
            API_DOMAIN=api.mainecybertech.us
            WWW_DOMAIN=www.mainecybertech.us
            DEPLOY_HOST=app.mainecybertech.us
          fi
          echo "name=$ENV_NAME" >> $GITHUB_OUTPUT
          echo "app_domain=$APP_DOMAIN" >> $GITHUB_OUTPUT
          echo "api_domain=$API_DOMAIN" >> $GITHUB_OUTPUT
          echo "www_domain=$WWW_DOMAIN" >> $GITHUB_OUTPUT
          echo "deploy_host=$DEPLOY_HOST" >> $GITHUB_OUTPUT
          echo "cors_origin=https://$APP_DOMAIN,https://$WWW_DOMAIN" >> $GITHUB_OUTPUT
          echo "ghcr_prefix=ghcr.io/$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

  build-api:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ needs.setup.outputs.ghcr_prefix }}/mct-api:${{ env.IMAGE_TAG }}
            ${{ needs.setup.outputs.ghcr_prefix }}/mct-api:${{ needs.setup.outputs.name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-worker:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          tags: |
            ${{ needs.setup.outputs.ghcr_prefix }}/mct-worker:${{ env.IMAGE_TAG }}
            ${{ needs.setup.outputs.ghcr_prefix }}/mct-worker:${{ needs.setup.outputs.name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://${{ needs.setup.outputs.api_domain }}
          tags: |
            ${{ needs.setup.outputs.ghcr_prefix }}/mct-web:${{ env.IMAGE_TAG }}
            ${{ needs.setup.outputs.ghcr_prefix }}/mct-web:${{ needs.setup.outputs.name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [setup, build-api, build-worker, build-web]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: ${{ needs.setup.outputs.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          PASSPHRASE="${{ secrets.DO_SSH_PASSPHRASE }}"
          if [ -n "$PASSPHRASE" ] && [ -n "${PASSPHRASE// /}" ]; then
            ssh-keygen -p -P "$PASSPHRASE" -N "" -f ~/.ssh/id_rsa
          fi
          ssh-keyscan -H "${{ needs.setup.outputs.deploy_host }}" >> ~/.ssh/known_hosts 2>&1 || echo "ssh-keyscan failed (non-fatal)"

      - name: Deploy to DigitalOcean
        shell: bash
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          GHCR_IMAGE_PREFIX: ${{ needs.setup.outputs.ghcr_prefix }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOST: ${{ needs.setup.outputs.deploy_host }}
          CF_ORIGIN_CERT: ${{ secrets.CF_ORIGIN_CERT }}
          CF_ORIGIN_KEY: ${{ secrets.CF_ORIGIN_KEY }}
          APP_DOMAIN: ${{ needs.setup.outputs.app_domain }}
          API_DOMAIN: ${{ needs.setup.outputs.api_domain }}
          CORS_ORIGIN: ${{ needs.setup.outputs.cors_origin }}
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=10 -o ServerAliveInterval=30"

          echo "--- WAITING FOR SSH ---"
          set +e
          for i in $(seq 1 10); do
            SSH_OUTPUT=$(ssh $SSH_OPTS root@$HOST "echo ALIVE" 2>&1)
            SSH_EXIT=$?
            if [ $SSH_EXIT -eq 0 ]; then
              echo "SSH ready after $((i * 10))s"
              break
            fi
            echo "SSH attempt $i/10 failed, retrying in 10s..."
            sleep 10
          done
          if [ $SSH_EXIT -ne 0 ]; then
            echo "SSH never became available after 10 attempts"
            exit 1
          fi
          set -e

          echo "--- WRITING .ENV ON DROPLET ---"
          ssh $SSH_OPTS root@$HOST "
            mkdir -p /opt/mct-portal
            cat > /opt/mct-portal/.env << 'ENVEOF'
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
            SENTRY_DSN=${{ secrets.SENTRY_DSN }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            EMAIL_FROM=${{ secrets.EMAIL_FROM }}
            JIRA_BASE_URL=${{ secrets.JIRA_BASE_URL }}
            JIRA_EMAIL=${{ secrets.JIRA_EMAIL }}
            JIRA_API_TOKEN=${{ secrets.JIRA_API_TOKEN }}
            JSM_BASE_URL=${{ secrets.JSM_BASE_URL }}
            M365_TENANT_ID=${{ secrets.M365_TENANT_ID }}
            M365_CLIENT_ID=${{ secrets.M365_CLIENT_ID }}
            M365_CLIENT_SECRET=${{ secrets.M365_CLIENT_SECRET }}
            PUBLIC_TRAFFIC_WEBHOOK_URL=${{ secrets.PUBLIC_TRAFFIC_WEBHOOK_URL }}
            PUBLIC_LEAD_WEBHOOK_URL=${{ secrets.PUBLIC_LEAD_WEBHOOK_URL }}
            JSM_DOMAIN=${{ secrets.JSM_DOMAIN }}
            JSM_EMAIL=${{ secrets.JSM_EMAIL }}
            JSM_API_TOKEN=${{ secrets.JSM_API_TOKEN }}
            JSM_SERVICEDESK_ID=${{ secrets.JSM_SERVICEDESK_ID }}
            JSM_REQUEST_TYPE_ID=${{ secrets.JSM_REQUEST_TYPE_ID }}
            APP_DOMAIN=${APP_DOMAIN}
            API_DOMAIN=${API_DOMAIN}
            CORS_ORIGIN=${CORS_ORIGIN}
            ENVEOF
            chmod 600 /opt/mct-portal/.env
          " 2>&1

          echo "--- TRANSFERRING COMPOSE AND CADDYFILE ---"
          ssh $SSH_OPTS root@$HOST "mkdir -p /opt/mct-portal"
          base64 -w0 infra/digitalocean/docker-compose.yml | ssh $SSH_OPTS root@$HOST "base64 -d > /opt/mct-portal/docker-compose.yml" 2>&1

          CADDYFILE_SRC="infra/digitalocean/Caddyfile.${{ needs.setup.outputs.name }}"
          if [ ! -f "$CADDYFILE_SRC" ]; then
            CADDYFILE_SRC="infra/digitalocean/Caddyfile"
          fi
          base64 -w0 "$CADDYFILE_SRC" | ssh $SSH_OPTS root@$HOST "base64 -d > /opt/mct-portal/Caddyfile" 2>&1

          echo "--- TRANSFERRING TLS CERTS ---"
          if [ -n "$CF_ORIGIN_CERT" ]; then
            echo "$CF_ORIGIN_CERT" > /tmp/fullchain.pem
            echo "$CF_ORIGIN_KEY" > /tmp/privkey.pem
            ssh $SSH_OPTS root@$HOST "mkdir -p /opt/mct-portal/certs"
            cat /tmp/fullchain.pem | ssh $SSH_OPTS root@$HOST "cat > /opt/mct-portal/certs/fullchain.pem"
            cat /tmp/privkey.pem | ssh $SSH_OPTS root@$HOST "cat > /opt/mct-portal/certs/privkey.pem"
            ssh $SSH_OPTS root@$HOST "chmod 600 /opt/mct-portal/certs/privkey.pem /opt/mct-portal/certs/fullchain.pem"
          else
            echo "CF_ORIGIN_CERT secret not set"
          fi

          echo "--- FREEING DISK SPACE ON DROPLET ---"
          ssh $SSH_OPTS root@$HOST "docker system prune -af --volumes 2>/dev/null; docker image ls --format '{{.Repository}}:{{.Tag}}' | grep 'mct-' | grep -v ':$IMAGE_TAG' | xargs -r docker rmi 2>/dev/null; true" 2>&1

          echo "--- LOGGING INTO GHCR ON DROPLET ---"
          echo "$GHCR_TOKEN" | ssh $SSH_OPTS root@$HOST "docker login ghcr.io -u $GHCR_USERNAME --password-stdin" 2>&1

          echo "--- PULLING IMAGES ON DROPLET ---"
          ssh $SSH_OPTS root@$HOST "
            docker pull $GHCR_IMAGE_PREFIX/mct-api:$IMAGE_TAG &&
            docker pull $GHCR_IMAGE_PREFIX/mct-worker:$IMAGE_TAG &&
            docker pull $GHCR_IMAGE_PREFIX/mct-web:$IMAGE_TAG
          " 2>&1

          echo "--- EXECUTING DEPLOY ---"
          ssh $SSH_OPTS root@$HOST "
            cd /opt/mct-portal
            IMAGE_TAG=$IMAGE_TAG GHCR_IMAGE_PREFIX=$GHCR_IMAGE_PREFIX docker compose up -d --no-deps api worker web caddy
            sleep 15
            docker compose ps --format 'table {{.Name}}\t{{.Status}}'
          " 2>&1

      - name: Health check after deploy
        env:
          API_DOMAIN: ${{ needs.setup.outputs.api_domain }}
          APP_DOMAIN: ${{ needs.setup.outputs.app_domain }}
        run: |
          set +e
          echo "--- API HEALTH CHECK ---"
          for i in $(seq 1 30); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 --max-time 10 "https://$API_DOMAIN/health" 2>/dev/null)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "API ready after $((i * 4))s"
              break
            fi
            echo "Attempt $i/30: API returned $HTTP_CODE, waiting 4s..."
            sleep 4
          done
          if [ "$HTTP_CODE" != "200" ]; then
            echo "API never became healthy after 30 attempts"
            exit 1
          fi

          echo "--- WEB HEALTH CHECK ---"
          for i in $(seq 1 15); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 --max-time 10 "https://$APP_DOMAIN/login" 2>/dev/null)
            if [ "$HTTP_CODE" != "000" ] && [ -n "$HTTP_CODE" ]; then
              echo "Web ready after $((i * 4))s (HTTP $HTTP_CODE)"
              break
            fi
            echo "Attempt $i/15: Web not reachable, waiting 4s..."
            sleep 4
          done
          if [ "$HTTP_CODE" = "000" ] || [ -z "$HTTP_CODE" ]; then
            echo "Web never became reachable after 15 attempts"
            exit 1
          fi

          echo "--- HEALTH CHECKS PASSED ---"
          set -e

      - name: Rollback on failure
        if: failure()
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          GHCR_IMAGE_PREFIX: ${{ needs.setup.outputs.ghcr_prefix }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOST: ${{ needs.setup.outputs.deploy_host }}
          SSH_OPTS: "-o StrictHostKeyChecking=no -o ConnectTimeout=10 -o ServerAliveInterval=30"
        run: |
          set +e
          echo "--- ROLLBACK TRIGGERED ---"
          ssh $SSH_OPTS root@$HOST "
            PREV_TAG=\$(docker image ls --format '{{.Tag}}' | grep -v '$IMAGE_TAG' | head -1)
            if [ -n \"\$PREV_TAG\" ]; then
              echo \"Rolling back to \$PREV_TAG...\"
              IMAGE_TAG=\$PREV_TAG GHCR_IMAGE_PREFIX=$GHCR_IMAGE_PREFIX docker compose up -d --no-deps api worker web caddy
            else
              echo \"No previous tag found, manual rollback required\"
            fi
          " 2>&1
          set -e