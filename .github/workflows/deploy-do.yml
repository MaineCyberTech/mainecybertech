name: deploy-do

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Target deployment environment"
        type: choice
        options: [dev, prod]
        default: dev
  push:
    branches: [main, develop]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "apps/worker/**"
      - "packages/**"
      - "infra/digitalocean/**"
      - ".github/workflows/deploy-do.yml"

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      id-token: write
    environment:
      name: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            ENV_NAME=prod
            APP_DOMAIN=app.mainecybertech.com
            API_DOMAIN=api.mainecybertech.com
            WWW_DOMAIN=www.mainecybertech.com
            DROPLET_NAME=mct-portal-prod
          else
            ENV_NAME=dev
            APP_DOMAIN=app.mainecybertech.us
            API_DOMAIN=api.mainecybertech.us
            WWW_DOMAIN=www.mainecybertech.us
            DROPLET_NAME=mct-portal-dev
          fi
          echo "name=$ENV_NAME" >> $GITHUB_OUTPUT
          echo "app_domain=$APP_DOMAIN" >> $GITHUB_OUTPUT
          echo "api_domain=$API_DOMAIN" >> $GITHUB_OUTPUT
          echo "www_domain=$WWW_DOMAIN" >> $GITHUB_OUTPUT
          echo "cors_origin=https://$APP_DOMAIN,https://$WWW_DOMAIN" >> $GITHUB_OUTPUT
          echo "droplet_name=$DROPLET_NAME" >> $GITHUB_OUTPUT
          echo "ssh_key=DO_SSH_PRIVATE_KEY" >> $GITHUB_OUTPUT
          echo "ssh_passphrase=DO_SSH_PASSPHRASE" >> $GITHUB_OUTPUT
          echo "ghcr_prefix=ghcr.io/$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Get Droplet IP via DigitalOcean API
        id: droplet
        run: |
          # Install doctl
          curl -sL https://github.com/digitalocean/doctl/releases/download/v1.115.0/doctl-1.115.0-linux-amd64.tar.gz | tar -xz -C /usr/local/bin
          # Get droplet IP by name - doctl output may have IP on next line
          echo "Looking for droplet: ${{ steps.env.outputs.droplet_name }}"
          # Get all output and find the IP after the droplet name
          DOCTL_OUTPUT=$(doctl compute droplet list --format Name,PublicIPv4 --no-header)
          echo "Full doctl output:"
          echo "$DOCTL_OUTPUT"
          DROPLET_IP=$(echo "$DOCTL_OUTPUT" | awk -v name="${{ steps.env.outputs.droplet_name }}" '$1 == name {print $2; next} $1 ~ "^" name "$" {getline; print $1; exit}')
          echo "Extracted IP: '$DROPLET_IP'"
          # Validate IP format
          if [[ ! "$DROPLET_IP" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Invalid IP format: '$DROPLET_IP'"
            exit 1
          fi
          echo "Droplet IP: $DROPLET_IP"
          echo "host=$DROPLET_IP" >> $GITHUB_OUTPUT
        env:
          DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DO_API_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.env.outputs.ghcr_prefix }}/mct-api:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          tags: ${{ steps.env.outputs.ghcr_prefix }}/mct-worker:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.env.outputs.ghcr_prefix }}/mct-web:${{ env.IMAGE_TAG }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://${{ steps.env.outputs.api_domain }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up SSH key
        run: |
           mkdir -p ~/.ssh
           echo "${{ secrets[steps.env.outputs.ssh_key] }}" > ~/.ssh/id_rsa
           chmod 600 ~/.ssh/id_rsa
           # Only strip passphrase if DO_SSH_PASSPHRASE secret is set AND non-whitespace
           PASSPHRASE="${{ secrets[steps.env.outputs.ssh_passphrase] }}"
           if [ -n "$PASSPHRASE" ] && [ -n "${PASSPHRASE// /}" ]; then
             ssh-keygen -p -P "$PASSPHRASE" -N "" -f ~/.ssh/id_rsa
           fi
           ssh-keyscan -H "${{ steps.droplet.outputs.host }}" >> ~/.ssh/known_hosts 2>&1 || echo "ssh-keyscan failed (non-fatal)"

      - name: Deploy to DigitalOcean
        shell: bash
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          GHCR_IMAGE_PREFIX: ${{ steps.env.outputs.ghcr_prefix }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOST: ${{ steps.droplet.outputs.host }}
          CF_ORIGIN_CERT: ${{ secrets.CF_ORIGIN_CERT }}
          CF_ORIGIN_KEY: ${{ secrets.CF_ORIGIN_KEY }}
          APP_DOMAIN: ${{ steps.env.outputs.app_domain }}
          API_DOMAIN: ${{ steps.env.outputs.api_domain }}
          CORS_ORIGIN: ${{ steps.env.outputs.cors_origin }}
        run: |
          echo "SSH_TEST_BEGIN"
          # Disable exit on error for SSH retries
          set +e
          # Minimal SSH test with retries
          SSH_OPTS="-o StrictHostKeyChecking=no -o LogLevel=INFO -o ServerAliveInterval=60 -o ServerAliveCountMax=10 -o ConnectTimeout=10"
          for i in $(seq 1 30); do
            echo "SSH attempt $i/30..."
            SSH_OUTPUT=$(ssh -v $SSH_OPTS root@$HOST "echo ALIVE_$(date +%s)" 2>&1)
            SSH_EXIT=$?
            echo "SSH_EXIT=$SSH_EXIT"
            echo "SSH_OUTPUT=$SSH_OUTPUT"
            if [ $SSH_EXIT -eq 0 ]; then
              echo "SSH ready after $((i * 10))s"
              break
            fi
            echo "Retrying in 10s..."
            sleep 10
          done
          if [ $SSH_EXIT -ne 0 ]; then
            echo "SSH never became available after 30 attempts"
            exit 1
          fi
          set -e
          echo "SSH_TEST_END"

          # Write .env directly on the droplet via SSH (secrets never in runner logs)
          echo "--- WRITING .ENV ON DROPLET ---"
          ssh $SSH_OPTS root@$HOST "
            mkdir -p /opt/mct-portal
            cat > /opt/mct-portal/.env << 'ENVEOF'
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
            SENTRY_DSN=${{ secrets.SENTRY_DSN }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            EMAIL_FROM=${{ secrets.EMAIL_FROM }}
            JIRA_BASE_URL=${{ secrets.JIRA_BASE_URL }}
            JIRA_EMAIL=${{ secrets.JIRA_EMAIL }}
            JIRA_API_TOKEN=${{ secrets.JIRA_API_TOKEN }}
            JSM_BASE_URL=${{ secrets.JSM_BASE_URL }}
            M365_TENANT_ID=${{ secrets.M365_TENANT_ID }}
            M365_CLIENT_ID=${{ secrets.M365_CLIENT_ID }}
            M365_CLIENT_SECRET=${{ secrets.M365_CLIENT_SECRET }}
            PUBLIC_TRAFFIC_WEBHOOK_URL=${{ secrets.PUBLIC_TRAFFIC_WEBHOOK_URL }}
            PUBLIC_LEAD_WEBHOOK_URL=${{ secrets.PUBLIC_LEAD_WEBHOOK_URL }}
            JSM_DOMAIN=${{ secrets.JSM_DOMAIN }}
            JSM_EMAIL=${{ secrets.JSM_EMAIL }}
            JSM_API_TOKEN=${{ secrets.JSM_API_TOKEN }}
            JSM_SERVICEDESK_ID=${{ secrets.JSM_SERVICEDESK_ID }}
            JSM_REQUEST_TYPE_ID=${{ secrets.JSM_REQUEST_TYPE_ID }}
            APP_DOMAIN=${{ steps.env.outputs.app_domain }}
            API_DOMAIN=${{ steps.env.outputs.api_domain }}
            CORS_ORIGIN=${{ steps.env.outputs.cors_origin }}
            ENVEOF
            chmod 600 /opt/mct-portal/.env
          " 2>&1

          echo "--- WRITING DEPLOY.SH ---"
          cat > /tmp/deploy.sh << 'DEPLOYSCRIPT'
          #!/bin/bash
          set -euo pipefail
          cd /opt/mct-portal
          echo "--- FREEING DISK SPACE ---"
          docker image prune -af || true
          IMAGE_TAG="$1" GHCR_IMAGE_PREFIX="$2" docker compose up -d --no-deps api worker web caddy
          docker image prune -af
          sleep 15
          docker compose ps --format "table {{.Name}}\t{{.Status}}"
          DEPLOYSCRIPT
          chmod +x /tmp/deploy.sh

          echo "--- ENSURING /opt/mct-portal EXISTS ---"
          ssh $SSH_OPTS root@$HOST "mkdir -p /opt/mct-portal" 2>&1
          echo "MKDIR_EXIT=$?"

          echo "--- TRANSFERRING DEPLOY.SH ---"
          base64 -w0 /tmp/deploy.sh | ssh $SSH_OPTS root@$HOST "base64 -d > /tmp/deploy.sh && chmod +x /tmp/deploy.sh" 2>&1
          echo "TRANSFER_DEPLOY_EXIT=$?"

          echo "--- TRANSFERRING COMPOSE FILE ---"
          base64 -w0 infra/digitalocean/docker-compose.yml | ssh $SSH_OPTS root@$HOST "base64 -d > /opt/mct-portal/docker-compose.yml" 2>&1
          echo "TRANSFER_COMPOSE_EXIT=$?"

          echo "--- TRANSFERRING CADDYFILE ---"
          base64 -w0 infra/digitalocean/Caddyfile | ssh $SSH_OPTS root@$HOST "base64 -d > /opt/mct-portal/Caddyfile" 2>&1
          echo "TRANSFER_CADDY_EXIT=$?"

          echo "--- TRANSFERRING TLS CERTS ---"
          if [ -n "$CF_ORIGIN_CERT" ]; then
            echo "$CF_ORIGIN_CERT" > /tmp/fullchain.pem
            echo "$CF_ORIGIN_KEY" > /tmp/privkey.pem
            ssh $SSH_OPTS root@$HOST "mkdir -p /opt/mct-portal/certs"
            cat /tmp/fullchain.pem | ssh $SSH_OPTS root@$HOST "cat > /opt/mct-portal/certs/fullchain.pem"
            cat /tmp/privkey.pem | ssh $SSH_OPTS root@$HOST "cat > /opt/mct-portal/certs/privkey.pem"
            ssh $SSH_OPTS root@$HOST "chmod 600 /opt/mct-portal/certs/privkey.pem /opt/mct-portal/certs/fullchain.pem"
            echo "CERT_EXIT=$?"
          else
            echo "CF_ORIGIN_CERT secret not set — using self-signed certs"
          fi

          echo "--- REMOVING OLD MCT IMAGES ON DROPLET ---"
          ssh $SSH_OPTS root@$HOST "docker image ls --format '{{.Repository}}:{{.Tag}}' | grep 'mct-' | grep -v ':$IMAGE_TAG' | xargs -r docker rmi 2>/dev/null; true" 2>&1
          echo "CLEANUP_EXIT=$?"

          echo "--- LOGGING INTO GHCR ON DROPLET ---"
          echo "$GHCR_TOKEN" | ssh $SSH_OPTS root@$HOST "docker login ghcr.io -u $GHCR_USERNAME --password-stdin" 2>&1
          echo "LOGIN_EXIT=$?"

          echo "--- PULLING IMAGES ON DROPLET ---"
          ssh $SSH_OPTS root@$HOST "
            docker pull $GHCR_IMAGE_PREFIX/mct-api:$IMAGE_TAG &&
            docker pull $GHCR_IMAGE_PREFIX/mct-worker:$IMAGE_TAG &&
            docker pull $GHCR_IMAGE_PREFIX/mct-web:$IMAGE_TAG
          " 2>&1
          echo "PULL_EXIT=$?"

          echo "--- EXECUTING DEPLOY ---"
          ssh $SSH_OPTS root@$HOST "bash /tmp/deploy.sh $IMAGE_TAG $GHCR_IMAGE_PREFIX" 2>&1
          echo "DEPLOY_EXIT=$?"
