name: deploy-do

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: Target environment
        type: choice
        options: [dev, prod]
        default: dev
  push:
    branches: [main, develop]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "apps/worker/**"
      - "packages/**"
      - "infra/digitalocean/**"
      - ".github/workflows/deploy-do.yml"

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      name: ${{ steps.env.outputs.name }}
      app_domain: ${{ steps.env.outputs.app_domain }}
      api_domain: ${{ steps.env.outputs.api_domain }}
      www_domain: ${{ steps.env.outputs.www_domain }}
      deploy_host: ${{ steps.env.outputs.deploy_host }}
      cors_origin: ${{ steps.env.outputs.cors_origin }}
      ghcr_prefix: ${{ steps.env.outputs.ghcr_prefix }}
    steps:
      - uses: actions/checkout@v4
      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ] || [ "${{ github.event.inputs.deploy_target }}" = "prod" ]; then
            APP_DOMAIN=app.mainecybertech.com
            API_DOMAIN=api.mainecybertech.com
            WWW_DOMAIN=www.mainecybertech.com
            ENV_NAME=prod
            DROPLET_NAME=mct-portal-prod
          else
            APP_DOMAIN=app.mainecybertech.us
            API_DOMAIN=api.mainecybertech.us
            WWW_DOMAIN=www.mainecybertech.us
            ENV_NAME=dev
            DROPLET_NAME=mct-portal-dev
          fi
          echo "name=$ENV_NAME" >> $GITHUB_OUTPUT
          echo "app_domain=$APP_DOMAIN" >> $GITHUB_OUTPUT
          echo "api_domain=$API_DOMAIN" >> $GITHUB_OUTPUT
          echo "www_domain=$WWW_DOMAIN" >> $GITHUB_OUTPUT
          echo "deploy_host=$DROPLET_NAME" >> $GITHUB_OUTPUT
          echo "cors_origin=https://$APP_DOMAIN,https://$WWW_DOMAIN" >> $GITHUB_OUTPUT
          echo "ghcr_prefix=ghcr.io/$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "droplet_name=$DROPLET_NAME" >> $GITHUB_OUTPUT

  resolve-ip:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      droplet_ip: ${{ steps.ip.outputs.droplet_ip }}
    steps:
      - name: Resolve droplet IP
        id: ip
        env:
          DO_API_TOKEN: ${{ secrets.DO_API_TOKEN }}
        run: |
          set -e
          DROPLET_NAME="${{ needs.setup.outputs.droplet_name }}"
          ALL_DROPLETS=$(curl -sf -H "Authorization: Bearer $DO_API_TOKEN" \
            "https://api.digitalocean.com/v2/droplets?page=1&per_page=200")
          IP=$(echo "$ALL_DROPLETS" | jq -r --arg name "$DROPLET_NAME" '[.droplets[] | select(.name==$name)] | sort_by(.created_at) | last | .networks.v4[0].ip_address // empty')
          if [ -z "$IP" ]; then
            echo "ERROR: No $DROPLET_NAME droplet found"
            echo "$ALL_DROPLETS" | jq '[.droplets[] | {name, ip: .networks.v4[0].ip_address, created: .created_at}]'
            exit 1
          fi
          echo "droplet_ip=$IP" >> $GITHUB_OUTPUT
          echo "Using droplet IP: $IP"

  build-api:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ needs.setup.outputs.ghcr_prefix }}/mct-api:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-worker:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          tags: ${{ needs.setup.outputs.ghcr_prefix }}/mct-worker:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://${{ needs.setup.outputs.api_domain }}
            NEXT_PUBLIC_APP_VERSION=${{ github.ref_name }}-${{ github.run_number }}
            NEXT_PUBLIC_GIT_SHA=${{ github.sha }}
            NEXT_PUBLIC_BUILD_TIME=${{ github.event.head_commit.timestamp || github.event.pusher.date || '' }}
          tags: ${{ needs.setup.outputs.ghcr_prefix }}/mct-web:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [setup, resolve-ip, build-api, build-worker, build-web]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ needs.resolve-ip.outputs.droplet_ip }}
          username: root
          key: ${{ secrets.CI_SSH_PRIVATE_KEY }}
          script: |
            set -e
            cloud-init status --wait 2>/dev/null || true
            if ! docker compose version >/dev/null 2>&1; then
              apt-get update -qq && DEBIAN_FRONTEND=noninteractive apt-get install -y -qq docker-compose-v2
            fi
            if ! git --version >/dev/null 2>&1; then
              apt-get install -y -qq git
            fi
            if [ ! -d "/opt/mct-portal/repo" ] || [ ! -d "/opt/mct-portal/repo/.git" ]; then
              rm -rf /opt/mct-portal/repo
              git clone https://github.com/${{ github.repository }}.git /opt/mct-portal/repo
            fi
            cd /opt/mct-portal/repo
            git fetch origin ${{ github.ref_name }}
            git checkout -B ${{ github.ref_name }} origin/${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            mkdir -p /opt/mct-portal
            printf '%s\n' \
              SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
              JWT_SECRET=${{ secrets.JWT_SECRET }} \
              SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
              SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }} \
              STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }} \
              STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }} \
              SENTRY_DSN=${{ secrets.SENTRY_DSN }} \
              SMTP_HOST=${{ secrets.SMTP_HOST }} \
              SMTP_PORT=${{ secrets.SMTP_PORT }} \
              SMTP_USER=${{ secrets.SMTP_USER }} \
              SMTP_PASS=${{ secrets.SMTP_PASS }} \
              EMAIL_FROM=${{ secrets.EMAIL_FROM }} \
              JIRA_BASE_URL=${{ secrets.JIRA_BASE_URL }} \
              JIRA_EMAIL=${{ secrets.JIRA_EMAIL }} \
              JIRA_API_TOKEN=${{ secrets.JIRA_API_TOKEN }} \
              JSM_BASE_URL=${{ secrets.JSM_BASE_URL }} \
              M365_TENANT_ID=${{ secrets.M365_TENANT_ID }} \
              M365_CLIENT_ID=${{ secrets.M365_CLIENT_ID }} \
              M365_CLIENT_SECRET=${{ secrets.M365_CLIENT_SECRET }} \
              PUBLIC_TRAFFIC_WEBHOOK_URL=${{ secrets.PUBLIC_TRAFFIC_WEBHOOK_URL }} \
              PUBLIC_LEAD_WEBHOOK_URL=${{ secrets.PUBLIC_LEAD_WEBHOOK_URL }} \
              JSM_DOMAIN=${{ secrets.JSM_DOMAIN }} \
              JSM_EMAIL=${{ secrets.JSM_EMAIL }} \
              JSM_API_TOKEN=${{ secrets.JSM_API_TOKEN }} \
              JSM_SERVICEDESK_ID=${{ secrets.JSM_SERVICEDESK_ID }} \
              JSM_REQUEST_TYPE_ID=${{ secrets.JSM_REQUEST_TYPE_ID }} \
              APP_DOMAIN=${{ needs.setup.outputs.app_domain }} \
              API_DOMAIN=${{ needs.setup.outputs.api_domain }} \
              CORS_ORIGIN=${{ needs.setup.outputs.cors_origin }} \
              > /opt/mct-portal/.env
            chmod 600 /opt/mct-portal/.env
            echo "Droplet ready"

      - name: Deploy containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ needs.resolve-ip.outputs.droplet_ip }}
          username: root
          key: ${{ secrets.CI_SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            mkdir -p /opt/mct-portal/certs
            echo "${{ secrets.CF_ORIGIN_CERT }}" > /opt/mct-portal/certs/fullchain.pem
            echo "${{ secrets.CF_ORIGIN_KEY }}" > /opt/mct-portal/certs/privkey.pem
            chmod 600 /opt/mct-portal/certs/privkey.pem
            docker system prune -af --volumes 2>/dev/null || true
            docker pull ${{ needs.setup.outputs.ghcr_prefix }}/mct-api:${{ env.IMAGE_TAG }}
            docker pull ${{ needs.setup.outputs.ghcr_prefix }}/mct-worker:${{ env.IMAGE_TAG }}
            docker pull ${{ needs.setup.outputs.ghcr_prefix }}/mct-web:${{ env.IMAGE_TAG }}
            CADDYFILE="infra/digitalocean/Caddyfile.${{ needs.setup.outputs.name }}"
            [ -f "/opt/mct-portal/repo/$CADDYFILE" ] || CADDYFILE="infra/digitalocean/Caddyfile"
            cp /opt/mct-portal/repo/$CADDYFILE /opt/mct-portal/Caddyfile
            cp /opt/mct-portal/repo/infra/digitalocean/docker-compose.yml /opt/mct-portal/docker-compose.yml
            cd /opt/mct-portal
            IMAGE_TAG=${{ env.IMAGE_TAG }} GHCR_IMAGE_PREFIX=${{ needs.setup.outputs.ghcr_prefix }} docker compose up -d --remove-orphans
            sleep 15
            docker compose ps --format 'table {{.Name}}\t{{.Status}}'

      - name: Health check
        env:
          API_DOMAIN: ${{ needs.setup.outputs.api_domain }}
          APP_DOMAIN: ${{ needs.setup.outputs.app_domain }}
        run: |
          for i in $(seq 1 30); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 --max-time 10 "https://$API_DOMAIN/health" 2>/dev/null || echo "000")
            [ "$CODE" = "200" ] && { echo "API ready after $((i*4))s"; break; }
            echo "Attempt $i/30: $CODE"; sleep 4
          done
          [ "$CODE" != "200" ] && { echo "API health check failed"; exit 1; }
          for i in $(seq 1 15); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 --max-time 10 "https://$APP_DOMAIN/login" 2>/dev/null || echo "000")
            [ "$CODE" != "000" ] && { echo "Web ready after $((i*4))s (HTTP $CODE)"; break; }
            echo "Attempt $i/15: $CODE"; sleep 4
          done
          [ "$CODE" = "000" ] && { echo "Web health check failed"; exit 1; }
          echo "--- ALL HEALTH CHECKS PASSED ---"