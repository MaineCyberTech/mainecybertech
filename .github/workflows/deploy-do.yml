name: deploy-do

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Target deployment environment"
        type: choice
        options: [dev, prod]
        default: dev
  push:
    branches: [main, develop]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "apps/worker/**"
      - "packages/**"
      - "infra/digitalocean/**"
      - ".github/workflows/deploy-do.yml"

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    environment:
      name: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "name=prod" >> $GITHUB_OUTPUT
            echo "app_domain=app.mainecybertech.com" >> $GITHUB_OUTPUT
            echo "api_domain=api.mainecybertech.com" >> $GITHUB_OUTPUT
          else
            echo "name=dev" >> $GITHUB_OUTPUT
            echo "app_domain=app.mainecybertech.us" >> $GITHUB_OUTPUT
            echo "api_domain=api.mainecybertech.us" >> $GITHUB_OUTPUT
          fi
          echo "host=DO_DROPLET_HOST" >> $GITHUB_OUTPUT
          echo "ssh_key=DO_SSH_PRIVATE_KEY" >> $GITHUB_OUTPUT
          echo "ssh_passphrase=DO_SSH_PASSPHRASE" >> $GITHUB_OUTPUT
          echo "ghcr_prefix=ghcr.io/$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.env.outputs.ghcr_prefix }}/mct-api:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          tags: ${{ steps.env.outputs.ghcr_prefix }}/mct-worker:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.env.outputs.ghcr_prefix }}/mct-web:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets[steps.env.outputs.host] }}
          username: root
          key: ${{ secrets[steps.env.outputs.ssh_key] }}
          passphrase: ${{ secrets[steps.env.outputs.ssh_passphrase] }}
          envs: IMAGE_TAG, GHCR_IMAGE_PREFIX
          script: |
            set -euo pipefail
            cd /opt/mct-portal

            export GHCR_IMAGE_PREFIX=${{ steps.env.outputs.ghcr_prefix }}

            # Write .env from GitHub secrets
            cat > .env << 'EOF'
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
            SENTRY_DSN=${{ secrets.SENTRY_DSN }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            EMAIL_FROM=${{ secrets.EMAIL_FROM }}
            JIRA_BASE_URL=${{ secrets.JIRA_BASE_URL }}
            JIRA_EMAIL=${{ secrets.JIRA_EMAIL }}
            JIRA_API_TOKEN=${{ secrets.JIRA_API_TOKEN }}
            JSM_BASE_URL=${{ secrets.JSM_BASE_URL }}
            JSM_EMAIL=${{ secrets.JSM_EMAIL }}
            JSM_API_TOKEN=${{ secrets.JSM_API_TOKEN }}
            M365_TENANT_ID=${{ secrets.M365_TENANT_ID }}
            M365_CLIENT_ID=${{ secrets.M365_CLIENT_ID }}
            M365_CLIENT_SECRET=${{ secrets.M365_CLIENT_SECRET }}
            APP_DOMAIN=${{ steps.env.outputs.app_domain }}
            API_DOMAIN=${{ steps.env.outputs.api_domain }}
            EOF

            # Pull new images and restart
            IMAGE_TAG=${{ env.IMAGE_TAG }} GHCR_IMAGE_PREFIX=$GHCR_IMAGE_PREFIX docker compose pull api worker web
            IMAGE_TAG=${{ env.IMAGE_TAG }} GHCR_IMAGE_PREFIX=$GHCR_IMAGE_PREFIX docker compose up -d --no-deps api worker web caddy

            # Clean up
            docker image prune -f

            # Health check
            sleep 5
            curl -sf http://localhost:4000/health || echo "WARNING: API health check failed"
            curl -sf http://localhost:3001/health || echo "WARNING: Worker health check failed"
