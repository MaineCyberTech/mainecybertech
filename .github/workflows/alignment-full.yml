name: alignment-full
on: [push, pull_request]
jobs:
  alignment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Gate PR on P0
        run: |
          P0=$(jq '.p0' dashboards/data/sample_data.json)
          if [ "$P0" -gt 0 ]; then
            echo "P0 count is $P0 — gating PR"
            exit 1
          fi