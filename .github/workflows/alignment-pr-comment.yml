
name: alignment-pr-comment
on:
  pull_request:
jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const data = require('./dashboards/data/sample_data.json');
            const body = '### Alignment Results\n' +
              'P0: ' + data.p0 + '\n' +
              'P1: ' + data.p1 + '\n' +
              'P2: ' + data.p2 + '\n' +
              'P3: ' + data.p3;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
