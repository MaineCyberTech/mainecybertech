name: terraform-do

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - "infra/terraform/digitalocean/**"
      - ".github/workflows/terraform-do.yml"

permissions:
  contents: read
  id-token: write

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform/digitalocean

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "name=prod" >> $GITHUB_OUTPUT
          else
            echo "name=dev" >> $GITHUB_OUTPUT
          fi

      - name: Terraform fmt
        run: terraform fmt -check
        continue-on-error: true

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="env/backend.${{ steps.env.outputs.name }}.hcl"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="env/${{ steps.env.outputs.name }}.tfvars" \
            -var="do_token=${{ secrets.DO_API_TOKEN }}" \
            -var="cloudflare_api_token=${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -var="cloudflare_zone_id=${{ secrets.CLOUDFLARE_ZONE_ID }}" \
            -var="ssh_fingerprint=${{ secrets.DO_SSH_FINGERPRINT }}" \
            -var="environment=${{ steps.env.outputs.name }}" \
            -no-color \
            -out=tfplan
        continue-on-error: false

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ steps.env.outputs.name }}
          path: infra/terraform/digitalocean/tfplan
          retention-days: 1

  terraform-apply-prod:
    needs: terraform-plan
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    environment: prod-approval
    defaults:
      run:
        working-directory: infra/terraform/digitalocean
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-prod
          path: infra/terraform/digitalocean

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

  terraform-apply-dev:
    needs: terraform-plan
    if: github.ref_name == 'develop'
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: infra/terraform/digitalocean
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-dev
          path: infra/terraform/digitalocean

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan