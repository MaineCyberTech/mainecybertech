name: terraform-do

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - "infra/terraform/digitalocean/**"
      - ".github/workflows/terraform-do.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "infra/terraform/digitalocean/**"
      - ".github/workflows/terraform-do.yml"

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform/digitalocean
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "name=prod" >> $GITHUB_OUTPUT
          else
            echo "name=dev" >> $GITHUB_OUTPUT
          fi

      - name: Terraform fmt
        run: terraform fmt -check
        continue-on-error: true

      - name: Create tfvars file
        id: tfvars
        env:
          DO_API_TOKEN: ${{ secrets.DO_API_TOKEN }}
          DO_SSH_FINGERPRINT: ${{ secrets.DO_SSH_FINGERPRINT }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_ZONE_ID_US: ${{ secrets.CLOUDFLARE_ZONE_ID_US }}
        run: |
          cat > "${{ steps.env.outputs.name }}.tfvars" <<EOF
          do_token              = "${DO_API_TOKEN}"
          ssh_fingerprint       = "${DO_SSH_FINGERPRINT}"
          cloudflare_api_token  = "${CLOUDFLARE_API_TOKEN}"
          cloudflare_zone_id    = "${CLOUDFLARE_ZONE_ID}"
          cloudflare_zone_id_us = "${CLOUDFLARE_ZONE_ID_US}"
          droplet_size          = "s-1vcpu-512mb-10gb"
          environment           = "${{ steps.env.outputs.name }}"
          EOF

      - name: Terraform Init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET_ACCESS_KEY }}
        run: |
          export AWS_ENDPOINT_URL=https://nyc3.digitaloceanspaces.com
          export AWS_SDK_LOAD_CONFIG=0
          terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="${{ steps.env.outputs.name }}.tfvars" \
            -no-color \
            -out=tfplan 2>&1 | tee ${{ runner.temp }}/tfplan.txt
        continue-on-error: false

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('${{ runner.temp }}/tfplan.txt', 'utf8');
            const envName = '${{ steps.env.outputs.name }}';
            const header = `## Terraform Plan (${envName})\n\n\`\`\`\n${planOutput.slice(0, 60000)}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: header
            });

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ steps.env.outputs.name }}
          path: infra/terraform/digitalocean/tfplan
          retention-days: 1

  terraform-apply-prod:
    needs: terraform-plan
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    environment: prod-approval
    defaults:
      run:
        working-directory: infra/terraform/digitalocean
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-prod
          path: infra/terraform/digitalocean

      - name: Terraform Init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET_ACCESS_KEY }}
        run: |
          export AWS_ENDPOINT_URL=https://nyc3.digitaloceanspaces.com
          export AWS_SDK_LOAD_CONFIG=0
          terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

  terraform-apply-dev:
    needs: terraform-plan
    if: github.ref_name == 'develop'
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: infra/terraform/digitalocean
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-dev
          path: infra/terraform/digitalocean

      - name: Terraform Init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET_ACCESS_KEY }}
        run: |
          export AWS_ENDPOINT_URL=https://nyc3.digitaloceanspaces.com
          export AWS_SDK_LOAD_CONFIG=0
          terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
