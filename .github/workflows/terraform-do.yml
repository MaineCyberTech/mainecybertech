name: terraform-do

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - "infra/terraform/digitalocean/**"
      - ".github/workflows/terraform-do.yml"

permissions:
  contents: read
  id-token: write

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform/digitalocean
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "name=prod" >> $GITHUB_OUTPUT
          else
            echo "name=dev" >> $GITHUB_OUTPUT
          fi

      - name: Terraform fmt
        run: terraform fmt -check
        continue-on-error: true

      - name: Create tfvars file
        id: tfvars
        env:
          DO_API_TOKEN: ${{ secrets.DO_API_TOKEN }}
          DO_SSH_FINGERPRINT: ${{ secrets.DO_SSH_FINGERPRINT }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          cat > "${{ steps.env.outputs.name }}.tfvars" <<EOF
          do_token              = "${DO_API_TOKEN}"
          ssh_fingerprint       = "${DO_SSH_FINGERPRINT}"
          cloudflare_api_token  = "${CLOUDFLARE_API_TOKEN}"
          cloudflare_zone_id    = "${CLOUDFLARE_ZONE_ID}"
          droplet_size          = "s-1vcpu-512mb-10gb"
          environment           = "${{ steps.env.outputs.name }}"
          EOF

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=portal-terraform-state" \
            -backend-config="key=digitalocean/${{ steps.env.outputs.name }}/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_metadata_api_check=true" \
            -backend-config="skip_requesting_account_id=true" \
            -backend-config="encrypt=true"
        env:
          AWS_ENDPOINT_URL: https://nyc3.digitaloceanspaces.com

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="${{ steps.env.outputs.name }}.tfvars" \
            -no-color \
            -out=tfplan
        continue-on-error: false

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ steps.env.outputs.name }}
          path: infra/terraform/digitalocean/tfplan
          retention-days: 1

  terraform-apply-prod:
    needs: terraform-plan
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    environment: prod-approval
    defaults:
      run:
        working-directory: infra/terraform/digitalocean
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-prod
          path: infra/terraform/digitalocean

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        env:
          AWS_ENDPOINT_URL: https://nyc3.digitaloceanspaces.com

  terraform-apply-dev:
    needs: terraform-plan
    if: github.ref_name == 'develop'
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: infra/terraform/digitalocean
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-dev
          path: infra/terraform/digitalocean

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=portal-terraform-state" \
            -backend-config="key=digitalocean/dev/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_metadata_api_check=true" \
            -backend-config="skip_requesting_account_id=true" \
            -backend-config="encrypt=true"
        env:
          AWS_ENDPOINT_URL: https://nyc3.digitaloceanspaces.com

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan tfplan
        env:
          AWS_ENDPOINT_URL: https://nyc3.digitaloceanspaces.com