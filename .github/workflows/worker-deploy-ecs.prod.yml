name: worker-deploy-ecs-prod

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/worker/**"
      - "packages/**"
      - ".github/workflows/worker-deploy-ecs.prod.yml"

jobs:
  validate:
    uses: ./.github/workflows/validate.yml

  e2e:
    uses: ./.github/workflows/e2e.yml
    secrets: inherit

  migrations:
    uses: ./.github/workflows/supabase-migrations.yml
    secrets: inherit

  deploy-prod:
    needs: [validate, e2e, migrations]
    runs-on: ubuntu-latest
    environment: prod-approval
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPOSITORY: ${{ vars.WORKER_ECR_REPOSITORY }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER_NAME }}
      ECS_SERVICE: ${{ vars.WORKER_ECS_SERVICE }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push worker image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" -f apps/worker/Dockerfile .
          docker push "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

      - name: Register task definition and deploy
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          TASK_DEF_FAMILY=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region "$AWS_REGION" \
            | jq -r '.services[0].taskDefinition' \
            | cut -d: -f1)
          aws ecs describe-task-definition \
            --task-definition "$TASK_DEF_FAMILY" \
            --region "$AWS_REGION" \
            | jq '.taskDefinition | {family, containerDefinitions, volumes, cpu, memory, executionRoleArn, taskRoleArn, networkMode, requiresCompatibilities}' \
            | jq --arg IMAGE "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
              '(.containerDefinitions[0].image) = $IMAGE' \
            > /tmp/task-def.json
          NEW_TASK_DEF=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/task-def.json \
            --region "$AWS_REGION" \
            | jq -r '.taskDefinition.taskDefinitionArn')
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "$NEW_TASK_DEF" \
            --force-new-deployment \
            --region "$AWS_REGION"

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region "$AWS_REGION"
        timeout-minutes: 10
