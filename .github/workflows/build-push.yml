name: build-push

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "apps/worker/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - ".dockerignore"
      - ".github/workflows/build-push.yml"

concurrency:
  group: build-push-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-api:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set env tag
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "ENV_TAG=prod" >> $GITHUB_ENV
          else
            echo "ENV_TAG=dev" >> $GITHUB_ENV
          fi
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
          echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}/mct-api:${{ env.IMAGE_TAG }}
            ghcr.io/${{ env.REPO_LC }}/mct-api:${{ env.ENV_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set env tag
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "ENV_TAG=prod" >> $GITHUB_ENV
          else
            echo "ENV_TAG=dev" >> $GITHUB_ENV
          fi
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}/mct-worker:${{ github.sha }}
            ghcr.io/${{ env.REPO_LC }}/mct-worker:${{ env.ENV_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set env tag
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "ENV_TAG=prod" >> $GITHUB_ENV
            echo "API_DOMAIN=api.mainecybertech.com" >> $GITHUB_ENV
          else
            echo "ENV_TAG=dev" >> $GITHUB_ENV
            echo "API_DOMAIN=api.mainecybertech.us" >> $GITHUB_ENV
          fi
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://${{ env.API_DOMAIN }}
          tags: |
            ghcr.io/${{ env.REPO_LC }}/mct-web:${{ github.sha }}
            ghcr.io/${{ env.REPO_LC }}/mct-web:${{ env.ENV_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max