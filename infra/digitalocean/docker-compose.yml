name: mct-portal

x-app-env: &app-env
  NODE_ENV: production
  SUPABASE_URL: ${SUPABASE_URL}
  SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
  SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
  JWT_SECRET: ${JWT_SECRET}
  CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
  APP_BASE_URL: https://${APP_DOMAIN:-app.mainecybertech.com}

services:
  # ===== Queue =====
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # ===== Our Apps =====
  api:
    image: ${GHCR_IMAGE_PREFIX:-ghcr.io/mainecybertech/mainecybertech}/mct-api:${IMAGE_TAG:-latest}
    environment:
      <<: *app-env
      API_PORT: 4000
      LOG_LEVEL: info
      REDIS_URL: redis://redis:6379
      SENTRY_DSN: ${SENTRY_DSN:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      PUBLIC_TRAFFIC_WEBHOOK_URL: ${PUBLIC_TRAFFIC_WEBHOOK_URL:-}
      PUBLIC_LEAD_WEBHOOK_URL: ${PUBLIC_LEAD_WEBHOOK_URL:-}
      JSM_DOMAIN: ${JSM_DOMAIN:-}
      JSM_EMAIL: ${JSM_EMAIL:-}
      JSM_API_TOKEN: ${JSM_API_TOKEN:-}
      JSM_SERVICEDESK_ID: ${JSM_SERVICEDESK_ID:-}
      JSM_REQUEST_TYPE_ID: ${JSM_REQUEST_TYPE_ID:-}
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped

  worker:
    image: ${GHCR_IMAGE_PREFIX:-ghcr.io/mainecybertech/mainecybertech}/mct-worker:${IMAGE_TAG:-latest}
    environment:
      <<: *app-env
      LOG_LEVEL: info
      HEALTH_PORT: 3001
      QUEUE_BACKEND: bullmq
      REDIS_URL: redis://redis:6379
      SENTRY_DSN: ${SENTRY_DSN:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      JIRA_BASE_URL: ${JIRA_BASE_URL:-}
      JIRA_EMAIL: ${JIRA_EMAIL:-}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN:-}
      JSM_BASE_URL: ${JSM_BASE_URL:-}
      JSM_EMAIL: ${JSM_EMAIL:-}
      JSM_API_TOKEN: ${JSM_API_TOKEN:-}
      M365_TENANT_ID: ${M365_TENANT_ID:-}
      M365_CLIENT_ID: ${M365_CLIENT_ID:-}
      M365_CLIENT_SECRET: ${M365_CLIENT_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@mainecybertech.com}
      API_BASE_URL: https://${API_DOMAIN:-api.mainecybertech.com}
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped

  web:
    image: ${GHCR_IMAGE_PREFIX:-ghcr.io/mainecybertech/mainecybertech}/mct-web:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api:4000
      NEXT_TELEMETRY_DISABLED: 1
      SENTRY_DSN: ${SENTRY_DSN:-}
    restart: unless-stopped

  # ===== Reverse Proxy =====
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
      - web
    restart: unless-stopped

volumes:
  redis-data:
  caddy-data:
  caddy-config:
